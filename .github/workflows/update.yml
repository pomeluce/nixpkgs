name: Auto Update

on:
  schedule:
    # 每天 UTC 6:00（北京时间 14:00）
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      package:
        description: '指定更新单个包（留空则全部更新）'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 确保 git diff HEAD~1 可用

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Setup Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v8

      # ── 阶段 1: 运行自动更新 ──────────────────────────
      - name: Run auto-update
        run: |
          if [ -n "${{ inputs.package }}" ]; then
            nix shell nixpkgs#nix-update -c ./update.sh "${{ inputs.package }}"
          else
            nix shell nixpkgs#nix-update -c ./update.sh
          fi

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet --exit-code; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "✅ No updates available"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "📋 Changed files:"
            git diff --stat
          fi

      # ── 阶段 2: 评估验证 ──────────────────────────────
      - name: Flake check
        if: steps.diff.outputs.changed == 'true'
        run: nix flake check --show-trace

      # ── 阶段 3: 构建验证（自动修正 hash mismatch）─────
      - name: Build updated packages
        if: steps.diff.outputs.changed == 'true'
        run: |
          # ── 构建 + hash mismatch 自动修正 ─────────────
          # nix-update 能更新主 src hash，但嵌套的 FOD
          # （如 node_modules.outputHash、cargoHash、vendorHash）
          # 可能滞后。此函数捕获 hash mismatch 并自动修正重试。
          build_with_hash_fix() {
            local attr="$1"
            local attempt=0 max=3

            while [ $attempt -lt $max ]; do
              attempt=$((attempt + 1))

              local log
              log=$(mktemp)
              if nix build ".#${attr}" --no-link --log-lines 50 >"$log" 2>&1; then
                cat "$log"
                echo "✅ Build passed: ${attr}"
                rm -f "$log"
                return 0
              fi

              # 检查是否为 hash mismatch
              if grep -q "hash mismatch" "$log" 2>/dev/null; then
                local specified got
                specified=$(grep "specified:" "$log" | head -1 | sed -n 's/.*specified: *//p' | xargs)
                got=$(grep "got:" "$log" | head -1 | sed -n 's/.*got: *//p' | xargs)

                if [ -n "$specified" ] && [ -n "$got" ] && [ "$specified" != "$got" ]; then
                  echo "  ⚠ Hash mismatch (attempt $attempt)"
                  echo "    specified: $specified"
                  echo "    got:       $got"

                  # 在所有变更文件中搜索并替换旧 hash
                  local replaced=false
                  for f in $(git diff --name-only | grep '\.nix$'); do
                    if grep -qF "$specified" "$f" 2>/dev/null; then
                      echo "  🔧 Updating hash in $f"
                      sed -i "s|$specified|$got|g" "$f"
                      replaced=true
                    fi
                  done

                  if $replaced; then
                    echo "  🔄 Retrying build..."
                    rm -f "$log"
                    continue
                  fi
                fi
              fi

              # 不是 hash mismatch 或无法修复，输出日志并失败
              cat "$log"
              rm -f "$log"
              echo "::error ::Build failed for ${attr}"
              return 1
            done

            echo "::error ::Build still failing after $max hash-fix attempts for ${attr}"
            return 1
          }

          declare -A attr_map=(
            [ccline]="ccline"
            [cli-proxy-api]="cli-proxy-api"
            [perry]="perry"
            [kulala-core]="kulala-core"
            [kulala-fmt]="kulala-fmt"
            [rime-ice]="rime-ice"
            [elegant-theme]="elegant-theme"
            [apple-font]="apple-font-pingfang apple-font-pingfang-relaxed apple-font-pingfang-ui apple-font-pingfang-emoji"
            [scripts]="ccs screenshot"
            [wpsoffice]="wpsoffice"
          )

          # 找到变更涉及的包目录
          mapfile -t changed_dirs < <(
            git diff --name-only | grep '^pkgs/' | cut -d'/' -f2 | sort -u
          )

          # 列出所有变更文件（用于 hash 替换搜索范围）
          changed_files=$(git diff --name-only)

          for dir in "${changed_dirs[@]}"; do
            attrs="${attr_map[$dir]:-}"
            if [ -z "$attrs" ]; then
              echo "::warning ::Unknown directory pkgs/$dir, skipping build"
              continue
            fi

            for attr in $attrs; do
              echo "::group::🔨 nix build .#${attr}"

              case "$attr" in
                apple-font-*|wpsoffice)
                  echo "⏭ Skipping unfree package"
                  ;;
                *)
                  build_with_hash_fix "$attr"
                  ;;
              esac

              echo "::endgroup::"
            done
          done

      # ── 阶段 4: 提交并创建 PR ──────────────────────────
      # 注意: 需在 repo Settings → Actions → General 中开启
      # "Allow GitHub Actions to create and approve pull requests"
      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m 'chore: auto-update packages'
          git push origin HEAD:ci/auto-update --force

      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 如果已有同分支 PR 则更新，否则新建
          existing=$(gh pr list --head ci/auto-update --state open --json number -q '.[0].number' 2>/dev/null)

          body=$(cat <<EOF
          🤖 Automated package updates by \`./update.sh\`.

          ### Updated packages

          \`\`\`
          $(git diff --stat HEAD~1)
          \`\`\`

          ### Verification

          - ✅ \`nix flake check\` passed
          - ✅ \`nix build\` passed for all updated packages
          - ⚠️ Please review hash changes before merging
          EOF
          )

          if [ -n "$existing" ]; then
            echo "Updating existing PR #${existing}"
            gh pr edit "$existing" --title 'chore: auto-update packages' --body "$body"
          else
            gh pr create \
              --title 'chore: auto-update packages' \
              --body "$body" \
              --base main \
              --head ci/auto-update \
              --label automated
          fi

      # ── 汇总输出 ──────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.diff.outputs.changed }}" = "true" ]; then
            echo "### 📦 Packages updated" >> "$GITHUB_STEP_SUMMARY"
            git diff --stat >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### ✅ All packages up-to-date" >> "$GITHUB_STEP_SUMMARY"
          fi
